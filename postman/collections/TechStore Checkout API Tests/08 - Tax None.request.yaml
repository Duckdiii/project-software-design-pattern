$kind: http-request
name: '08 - Tax None'
method: POST
url: 'http://localhost:5000/api/checkout'
order: 8000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "items": [
        { "name": "Laptop", "price": 2000000 }
      ],
      "taxType": "none"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Tax is 0", function () {
          const json = pm.response.json();
          pm.expect(json.tax).to.eql(0);
      });
    language: text/javascript
