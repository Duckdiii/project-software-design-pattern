$kind: http-request
name: '11 - Payment MoMo'
method: POST
url: 'http://localhost:5000/api/checkout'
order: 11000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "items": [
        { "name": "Laptop", "price": 2000000 }
      ],
      "paymentType": "momo"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("MoMo payment fee is 2% of (subTotal + tax)", function () {
          const json = pm.response.json();
          const base = json.subTotal - json.discount + json.tax;
          const expectedFee = base * 0.02;
          pm.expect(json.paymentFee).to.eql(expectedFee);
      });
      pm.test("Total includes payment fee", function () {
          const json = pm.response.json();
          pm.expect(json.total).to.eql(json.subTotal - json.discount + json.tax + json.paymentFee);
      });
    language: text/javascript
