$kind: http-request
name: '03 - Decorator Warranty'
method: POST
url: 'http://localhost:5000/api/checkout'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "items": [
        { "name": "iPhone 15", "price": 1000000, "decorators": ["warranty"] }
      ]
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Item price includes warranty (+50000)", function () {
          const json = pm.response.json();
          pm.expect(json.items[0].price).to.eql(1050000);
      });
      pm.test("Description includes warranty text", function () {
          const json = pm.response.json();
          pm.expect(json.items[0].description).to.include("Bảo hành mở rộng");
      });
      pm.test("SubTotal reflects decorated price", function () {
          const json = pm.response.json();
          pm.expect(json.subTotal).to.eql(1050000);
      });
    language: text/javascript
