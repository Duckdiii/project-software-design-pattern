$kind: http-request
name: '09 - Promotion Percentage'
method: POST
url: 'http://localhost:5000/api/checkout'
order: 9000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "items": [
        { "name": "Laptop", "price": 2000000 }
      ],
      "promotionType": "percentage",
      "promotionValue": 0.2
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Discount is 20% of subtotal", function () {
          const json = pm.response.json();
          pm.expect(json.discount).to.eql(400000);
      });
      pm.test("Total accounts for discount", function () {
          const json = pm.response.json();
          pm.expect(json.total).to.eql(json.subTotal - json.discount + json.tax + json.paymentFee);
      });
    language: text/javascript
