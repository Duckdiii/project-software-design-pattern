<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore Checkout - Sandbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .checkout-box {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .body {
            padding: 30px;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .product-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .product-item:hover {
            border-color: #667eea;
            background: #f9f9f9;
        }
        
        .product-item input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .product-item.selected {
            border-color: #667eea;
            background: #f0f3ff;
        }
        
        .product-info {
            flex: 1;
        }
        
        .product-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 3px;
        }
        
        .product-price {
            font-size: 14px;
            color: #667eea;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .checkbox-item label {
            margin: 0;
            cursor: pointer;
        }
        
        .summary {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .summary-row.total {
            border-top: 2px solid #eee;
            padding-top: 10px;
            font-weight: bold;
            font-size: 16px;
            color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #dee2e6;
        }
        
        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
        
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        
        .status.show {
            display: block;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .payment-methods {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        @media (max-width: 600px) {
            .payment-methods {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkout-box">
            <div class="header">
                <h1>🛒 Thanh Toán TechStore</h1>
                <p>Chế độ Sandbox - Test Payment Gateways</p>
            </div>
            
            <div class="body">
                <!-- Products Section -->
                <div class="section">
                    <div class="section-title">📱 Chọn Sản Phẩm</div>
                    <div id="products-container"></div>
                </div>
                
                <!-- Decorators Section -->
                <div class="section">
                    <div class="section-title">🎁 Thêm Dịch Vụ</div>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="warranty" value="warranty">
                            <label for="warranty">Bảo Hành 2 Năm (+500,000 ₫)</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="screen-protector" value="screen-protector">
                            <label for="screen-protector">Kính Cường Lực (+200,000 ₫)</label>
                        </div>
                    </div>
                </div>
                
                <!-- Tax Section -->
                <div class="section">
                    <div class="form-group">
                        <label for="tax">📊 Loại Thuế</label>
                        <select id="tax" onchange="updateSummary()">
                            <option value="standard">Thuế chuẩn 10%</option>
                            <option value="reduced">Thuế giảm 5%</option>
                            <option value="none">Không tính thuế</option>
                        </select>
                    </div>
                </div>
                
                <!-- Payment Method Section -->
                <div class="section">
                    <div class="section-title">💳 Phương Thức Thanh Toán</div>
                    <div class="form-group">
                        <select id="payment" onchange="updateSummary()">
                            <option value="cash">💵 Tiền Mặt (0% phí)</option>
                            <option value="momo">🔴 MoMo (2% phí) - Sandbox</option>
                            <option value="vnpay">🔵 VNPay (1% phí) - Sandbox</option>
                            <option value="creditcard">💳 Thẻ Tín Dụng (1.5% + 5k)</option>
                        </select>
                    </div>
                </div>
                
                <!-- Summary Section -->
                <div class="summary">
                    <div class="summary-row">
                        <span>Tổng Tiền Hàng:</span>
                        <span id="subtotal">0 ₫</span>
                    </div>
                    <div class="summary-row">
                        <span>Phí Thanh Toán:</span>
                        <span id="fee">0 ₫</span>
                    </div>
                    <div class="summary-row">
                        <span>Thuế:</span>
                        <span id="tax-display">0 ₫</span>
                    </div>
                    <div class="summary-row total">
                        <span>TỔNG:</span>
                        <span id="total">0 ₫</span>
                    </div>
                </div>
                
                <!-- Action Buttons -->
                <div class="button-group">
                    <button class="btn btn-primary" onclick="checkout()">
                        <span id="checkout-loading" class="hidden loading"></span>
                        💳 Thanh Toán
                    </button>
                    <button class="btn btn-secondary" onclick="resetForm()">
                        🔄 Reset
                    </button>
                </div>
                
                <!-- Status -->
                <div class="status" id="status"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';
        
        const products = [
            { id: 1, name: 'iPhone 15 Pro', price: 30000000 },
            { id: 2, name: 'Samsung Galaxy S24', price: 22000000 },
            { id: 3, name: 'MacBook Air M3', price: 27000000 },
            { id: 4, name: 'Sony Headphones', price: 9000000 },
        ];
        
        let selectedProductId = 1;
        
        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updateSummary();
        });
        
        function renderProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = products.map(p => `
                <div class="product-item ${p.id === selectedProductId ? 'selected' : ''}" 
                     onclick="selectProduct(${p.id})">
                    <input type="radio" name="product" value="${p.id}" 
                           ${p.id === selectedProductId ? 'checked' : ''}>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${formatPrice(p.price)}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function selectProduct(id) {
            selectedProductId = id;
            renderProducts();
            updateSummary();
        }
        
        function updateSummary() {
            const product = products.find(p => p.id === selectedProductId);
            const warrantyEl = document.getElementById('warranty');
            const screenEl = document.getElementById('screen-protector');
            const taxType = document.getElementById('tax').value;
            const paymentType = document.getElementById('payment').value;
            
            let subtotal = product.price;
            if (warrantyEl.checked) subtotal += 500000;
            if (screenEl.checked) subtotal += 200000;
            
            // Calculate tax
            let tax = 0;
            if (taxType === 'standard') tax = subtotal * 0.1;
            else if (taxType === 'reduced') tax = subtotal * 0.05;
            
            // Calculate payment fee
            let fee = 0;
            if (paymentType === 'momo') fee = (subtotal + tax) * 0.02;
            else if (paymentType === 'vnpay') fee = (subtotal + tax) * 0.01;
            else if (paymentType === 'creditcard') fee = (subtotal + tax) * 0.015 + 5000;
            
            const total = Math.round(subtotal + tax + fee);
            
            document.getElementById('subtotal').textContent = formatPrice(subtotal);
            document.getElementById('fee').textContent = formatPrice(Math.round(fee));
            document.getElementById('tax-display').textContent = formatPrice(Math.round(tax));
            document.getElementById('total').textContent = formatPrice(total);
        }
        
        async function checkout() {
            const loadingEl = document.getElementById('checkout-loading');
            const statusEl = document.getElementById('status');
            const product = products.find(p => p.id === selectedProductId);
            const warrantyEl = document.getElementById('warranty');
            const screenEl = document.getElementById('screen-protector');
            const taxType = document.getElementById('tax').value;
            const paymentType = document.getElementById('payment').value;
            
            loadingEl.classList.remove('hidden');
            statusEl.classList.remove('show', 'success', 'error');
            
            try {
                // Build decorators
                const decorators = [];
                if (warrantyEl.checked) decorators.push('warranty');
                if (screenEl.checked) decorators.push('screen-protector');
                
                // Call appropriate API based on payment method
                if (paymentType === 'momo' || paymentType === 'vnpay') {
                    // Calculate amount
                    const subtotal = product.price + (warrantyEl.checked ? 500000 : 0) + (screenEl.checked ? 200000 : 0);
                    let tax = 0;
                    if (taxType === 'standard') tax = subtotal * 0.1;
                    else if (taxType === 'reduced') tax = subtotal * 0.05;
                    
                    let fee = 0;
                    if (paymentType === 'momo') fee = (subtotal + tax) * 0.02;
                    else if (paymentType === 'vnpay') fee = (subtotal + tax) * 0.01;
                    
                    const amount = Math.round(subtotal + tax + fee);
                    
                    const endpoint = paymentType === 'momo' 
                        ? `${API_URL}/api/momo-payment`
                        : `${API_URL}/api/vnpay-payment`;
                    
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            orderId: 'ORDER_' + Date.now(),
                            amount: amount,
                            orderInfo: product.name,
                            isSandbox: true
                        })
                    });
                    
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const data = await response.json();
                    
                    if (paymentType === 'momo') {
                        statusEl.innerHTML = `✅ Chuyển hướng đến MoMo...`;
                        setTimeout(() => {
                            window.open(data.endpoint, '_blank');
                        }, 1000);
                    } else {
                        statusEl.innerHTML = `✅ Chuyển hướng đến VNPay...`;
                        setTimeout(() => {
                            window.open(data.paymentUrl, '_blank');
                        }, 1000);
                    }
                    
                    statusEl.classList.add('show', 'success');
                } else {
                    // Cash or Credit Card - just show receipt
                    const response = await fetch(`${API_URL}/api/checkout`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            items: [{
                                name: product.name,
                                price: product.price,
                                decorators: decorators
                            }],
                            taxType: taxType,
                            paymentType: paymentType,
                            isSandbox: true
                        })
                    });
                    
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const data = await response.json();
                    statusEl.innerHTML = `✅ <strong>${paymentType === 'cash' ? 'Nuôn tiền mặt' : 'Thanh toán bằng thẻ'}</strong><br>Tổng cộng: ${formatPrice(data.total)}`;
                    statusEl.classList.add('show', 'success');
                }
            } catch (error) {
                statusEl.innerHTML = `❌ <strong>Lỗi:</strong> ${error.message}`;
                statusEl.classList.add('show', 'error');
            } finally {
                loadingEl.classList.add('hidden');
            }
        }
        
        function resetForm() {
            selectedProductId = 1;
            document.getElementById('warranty').checked = false;
            document.getElementById('screen-protector').checked = false;
            document.getElementById('tax').value = 'standard';
            document.getElementById('payment').value = 'cash';
            document.getElementById('status').classList.remove('show');
            renderProducts();
            updateSummary();
        }
        
        function formatPrice(price) {
            return new Intl.NumberFormat('vi-VN', {
                style: 'currency',
                currency: 'VND'
            }).format(price);
        }
    </script>
</body>
</html>
