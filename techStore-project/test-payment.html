<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test QR Code Payments</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f9f9;
        }
        
        .test-section h2 {
            color: #555;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        input, textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        button {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #764ba2;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #653a7f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }
        
        .response-box {
            background: white;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .response-box.error {
            border-left-color: #e74c3c;
            background: #fadbd8;
        }
        
        .response-box.success {
            border-left-color: #27ae60;
            background: #d5f4e6;
        }
        
        .response-box h4 {
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .response-box pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 3px;
            font-size: 12px;
            overflow-x: auto;
            color: #333;
        }
        
        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .info-box {
            background: #ecf0f1;
            border-left: 4px solid #3498db;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #555;
        }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        @media (max-width: 600px) {
            .row {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .container {
                padding: 15px;
            }
        }
        
        .success-message {
            color: #27ae60;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Payment Gateway Test</h1>
        
        <div class="info-box">
            ℹ️ Backend must be running on <code>http://localhost:5000</code>
        </div>
        
        <!-- MOMO Test Section -->
        <div class="test-section">
            <h2>📱 Momo QR Test</h2>
            
            <div class="form-group">
                <label>Số tiền (VND)</label>
                <input type="number" id="momoAmount" value="100000" min="1000" max="50000000">
            </div>
            
            <div class="form-group">
                <label>Thông tin đơn hàng</label>
                <input type="text" id="momoOrderInfo" value="Thanh toán tại TechStore">
            </div>
            
            <div class="button-group">
                <button class="btn-primary" onclick="testMomoQR()">Tạo Momo QR</button>
                <button class="btn-secondary" onclick="copyMomoResponse()">Copy Response</button>
            </div>
            
            <div id="momoResponse" class="response-box"></div>
        </div>
        
        <!-- VNPAY Test Section -->
        <div class="test-section">
            <h2>💳 VNPay QR Test</h2>
            
            <div class="form-group">
                <label>Số tiền (VND)</label>
                <input type="number" id="vnpayAmount" value="100000" min="1000" max="50000000">
            </div>
            
            <div class="form-group">
                <label>Thông tin đơn hàng</label>
                <input type="text" id="vnpayOrderInfo" value="Thanh toán tại TechStore">
            </div>
            
            <div class="button-group">
                <button class="btn-primary" onclick="testVNPayQR()">Tạo VNPay QR</button>
                <button class="btn-secondary" onclick="copyVNPayResponse()">Copy Response</button>
            </div>
            
            <div id="vnpayResponse" class="response-box"></div>
        </div>
        
        <!-- API Health Check -->
        <div class="test-section">
            <h2>🏥 API Health Check</h2>
            
            <div class="button-group">
                <button class="btn-primary" onclick="checkHealth()">Kiểm tra Backend</button>
                <button class="btn-secondary" onclick="getStrategies()">Lấy Payment Strategies</button>
            </div>
            
            <div id="healthResponse" class="response-box"></div>
        </div>
        
        <!-- Console Log -->
        <div class="test-section">
            <h2>📋 Console Output</h2>
            <button class="btn-secondary" onclick="clearConsole()">Xóa Console</button>
            <div id="consoleOutput" style="background: #000; color: #0f0; padding: 15px; border-radius: 5px; margin-top: 10px; font-family: 'Courier New'; font-size: 12px; max-height: 200px; overflow-y: auto; display: none;"></div>
        </div>
    </div>

    <script>
        // Override console.log to display in page
        const originalLog = console.log;
        const consoleOutput = document.getElementById('consoleOutput');
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            consoleOutput.style.display = 'block';
            const message = args.map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
            ).join(' ');
            const timestamp = new Date().toLocaleTimeString();
            consoleOutput.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        };
        
        function clearConsole() {
            consoleOutput.innerHTML = '';
            consoleOutput.style.display = 'none';
        }
        
        function showResponse(elementId, data, isError = false) {
            const element = document.getElementById(elementId);
            element.classList.remove('success', 'error');
            element.classList.add(isError ? 'error' : 'success');
            element.style.display = 'block';
            
            let html = `<h4>${isError ? '❌ Lỗi' : '✅ Thành công'}</h4>`;
            
            if (typeof data === 'object') {
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } else {
                html += `<pre>${data}</pre>`;
            }
            
            element.innerHTML = html;
        }
        
        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            const text = element.innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }
        
        function copyMomoResponse() {
            copyToClipboard('momoResponse');
        }
        
        function copyVNPayResponse() {
            copyToClipboard('vnpayResponse');
        }
        
        async function checkHealth() {
            console.log('[Health Check] Starting...');
            try {
                const response = await fetch('http://localhost:5000/api/health');
                const data = await response.json();
                console.log('[Health Check] Response:', data);
                showResponse('healthResponse', data);
            } catch (error) {
                console.error('[Health Check Error]:', error);
                showResponse('healthResponse', error.message, true);
            }
        }
        
        async function getStrategies() {
            console.log('[Strategies] Fetching...');
            try {
                const response = await fetch('http://localhost:5000/api/checkout/strategies');
                const data = await response.json();
                console.log('[Strategies] Response:', data);
                showResponse('healthResponse', data);
            } catch (error) {
                console.error('[Strategies Error]:', error);
                showResponse('healthResponse', error.message, true);
            }
        }
        
        async function testMomoQR() {
            const amount = document.getElementById('momoAmount').value;
            const orderInfo = document.getElementById('momoOrderInfo').value;
            
            if (!amount || amount <= 0) {
                showResponse('momoResponse', 'Vui lòng nhập số tiền hợp lệ', true);
                return;
            }
            
            console.log('[Momo Test] Amount:', amount, 'OrderInfo:', orderInfo);
            
            const button = event.target;
            button.disabled = true;
            button.innerHTML = '<div class="loading"></div> Đang xử lý...';
            
            try {
                const body = {
                    amount: parseInt(amount),
                    paymentStrategy: 'E_WALLET',
                    orderInfo: orderInfo
                };
                
                console.log('[Momo] Sending request:', body);
                
                const response = await fetch('http://localhost:5000/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                console.log('[Momo] Response status:', response.status);
                console.log('[Momo] Response data:', data);
                
                if (data.success && data.data && data.data.payUrl) {
                    showResponse('momoResponse', {
                        success: true,
                        message: '✅ QR generated successfully',
                        payUrl: data.data.payUrl,
                        orderId: data.data.orderId,
                        amount: data.data.amount
                    });
                    
                    // Auto redirect after 3 seconds
                    console.log('[Momo] Redirecting to payment gateway in 3 seconds...');
                    setTimeout(() => {
                        console.log('[Momo] Redirecting to:', data.data.payUrl);
                        window.location.href = data.data.payUrl;
                    }, 3000);
                } else {
                    showResponse('momoResponse', data, true);
                }
            } catch (error) {
                console.error('[Momo Error]:', error);
                showResponse('momoResponse', error.message, true);
            } finally {
                button.disabled = false;
                button.innerHTML = 'Tạo Momo QR';
            }
        }
        
        async function testVNPayQR() {
            const amount = document.getElementById('vnpayAmount').value;
            const orderInfo = document.getElementById('vnpayOrderInfo').value;
            
            if (!amount || amount <= 0) {
                showResponse('vnpayResponse', 'Vui lòng nhập số tiền hợp lệ', true);
                return;
            }
            
            console.log('[VNPay Test] Amount:', amount, 'OrderInfo:', orderInfo);
            
            const button = event.target;
            button.disabled = true;
            button.innerHTML = '<div class="loading"></div> Đang xử lý...';
            
            try {
                const body = {
                    amount: parseInt(amount),
                    paymentStrategy: 'VNPAY',
                    orderInfo: orderInfo
                };
                
                console.log('[VNPay] Sending request:', body);
                
                const response = await fetch('http://localhost:5000/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                console.log('[VNPay] Response status:', response.status);
                console.log('[VNPay] Response data:', data);
                
                if (data.success && data.data && data.data.payUrl) {
                    showResponse('vnpayResponse', {
                        success: true,
                        message: '✅ Payment URL generated successfully',
                        payUrl: data.data.payUrl.substring(0, 100) + '...',
                        orderId: data.data.orderId,
                        amount: data.data.amount
                    });
                    
                    // Auto redirect after 3 seconds
                    console.log('[VNPay] Redirecting to payment gateway in 3 seconds...');
                    setTimeout(() => {
                        console.log('[VNPay] Redirecting to:', data.data.payUrl);
                        window.location.href = data.data.payUrl;
                    }, 3000);
                } else {
                    showResponse('vnpayResponse', data, true);
                }
            } catch (error) {
                console.error('[VNPay Error]:', error);
                showResponse('vnpayResponse', error.message, true);
            } finally {
                button.disabled = false;
                button.innerHTML = 'Tạo VNPay QR';
            }
        }
        
        // Auto check health on page load
        window.onload = () => {
            console.log('[Page] Loaded - checking backend...');
            setTimeout(checkHealth, 500);
        };
    </script>
</body>
</html>
